<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>జీవన రేఖ — Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Telugu:wght@300;400;600&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #070708;
      --surface:  #0f0f11;
      --border:   rgba(255,255,255,0.07);
      --red:      #e63030;
      --red-dim:  rgba(230,48,48,0.15);
      --text:     #f0eff0;
      --muted:    rgba(240,239,240,0.45);
      --faint:    rgba(240,239,240,0.12);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(230,48,48,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(230,48,48,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, var(--red), #ff6b6b, var(--red));
      background-size: 200% 100%;
      z-index: 100;
      opacity: 0.9;
      transition: width 0.05s linear;
    }

    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 40px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(7,7,8,0.7);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-img {
      height: 40px;
      width: auto;
      filter: invert(1);
      mix-blend-mode: screen;
      opacity: 0.9;
    }

    .logo-divider {
      width: 1px;
      height: 28px;
      background: var(--border);
    }

    .logo-text {
      font-family: 'Noto Serif Telugu', serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--muted);
    }

    .maintenance-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid rgba(230,48,48,0.3);
      border-radius: 20px;
      background: var(--red-dim);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(230,100,100,0.9);
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    main {
      position: relative;
      z-index: 10;
      min-height: calc(100vh - 85px - 60px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 28px;
    }

    h1 {
      font-family: 'Noto Serif Telugu', serif;
      font-size: clamp(48px, 9vw, 96px);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 10px;
    }

    h1 .light { font-weight: 200; opacity: 0.65; }

    .subtitle {
      font-size: clamp(13px, 2vw, 16px);
      font-weight: 300;
      color: var(--muted);
      margin-bottom: 48px;
      max-width: 420px;
      line-height: 1.7;
    }

    .time-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 44px;
      margin-bottom: 48px;
      min-width: 280px;
      overflow: hidden;
    }

    .time-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      opacity: 0.7;
    }

    .time-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .time-value {
      font-size: 28px;
      font-weight: 200;
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .time-date {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    .status-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2.5s ease-in-out infinite;
    }

    footer {
      position: relative;
      z-index: 10;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      border-top: 1px solid var(--border);
    }

    .footer-email {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }

    .footer-email:hover { color: var(--text); }

    .footer-copy {
      font-size: 11px;
      color: var(--faint);
      letter-spacing: 0.04em;
    }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      footer { padding: 16px 20px; flex-direction: column; gap: 6px; height: auto; }
      .time-card { padding: 22px 28px; min-width: 0; width: 100%; max-width: 320px; }
    }
  </style>
</head>

  <script>
    function tick() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
      document.getElementById('date-display').textContent =
        now.toLocaleDateString('te-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    tick();
    setInterval(tick, 1000);

    let w = 0;
    const pb = document.getElementById('pb');
    setInterval(() => {
      w = (w + 0.5) % 100;
      pb.style.width = w + '%';
    }, 50);
