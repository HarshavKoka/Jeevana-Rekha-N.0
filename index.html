<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>జీవన రేఖ — Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Serif+Telugu:wght@300;400;600&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--bg:#070708;
--surface:#0f0f11;
--border:rgba(255,255,255,0.07);
--red:#e63030;
--text:#f0eff0;
--muted:rgba(240,239,240,0.45);
}

body{
height:100vh;
background:var(--bg);
color:var(--text);
font-family:'Inter',sans-serif;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.eyebrow{
font-size:14px;
font-weight:600;
letter-spacing:0.2em;
text-transform:uppercase;
color:var(--red);
margin-bottom:30px;
}

h1{
font-family:'Noto Serif Telugu',serif;
font-size:clamp(48px,8vw,90px);
font-weight:300;
margin-bottom:20px;
}

.subtitle{
font-size:16px;
color:var(--muted);
margin-bottom:40px;
max-width:500px;
line-height:1.6;
}

.time-box{
background:var(--surface);
border:1px solid var(--border);
border-radius:14px;
padding:30px 50px;
}

.time{
font-family:'Orbitron',sans-serif;
font-weight:700;
font-size:40px;
letter-spacing:3px;
}

.date{
margin-top:8px;
font-size:13px;
color:var(--muted);
letter-spacing:1px;
}
</style>
</head>

<body>

<div class="eyebrow">Scheduled Maintenance</div>

<h1>జీవన రేఖ</h1>

<div class="subtitle">
Will be back at 7:00 am IST — Thank you for your patience...
</div>

<div class="time-box">
<div class="time" id="clock">00:00:00</div>
<div class="date" id="date"></div>
</div>

<script>
function updateClock(){
const now=new Date();

const ist=new Date(now.toLocaleString("en-US",{timeZone:"Asia/Kolkata"}));

let h=ist.getHours().toString().padStart(2,'0');
let m=ist.getMinutes().toString().padStart(2,'0');
let s=ist.getSeconds().toString().padStart(2,'0');

document.getElementById("clock").textContent=`${h}:${m}:${s}`;

const options={day:'numeric',month:'short',year:'numeric'};
document.getElementById("date").textContent=ist.toLocaleDateString("en-IN",options);
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
