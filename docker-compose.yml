# ============================================================
# Jeevana Rekha — Local Docker Testing
# Usage:
#   1. Copy apps/web/.env.local to .env and fill values
#   2. docker-compose up --build
#   3. Visit http://localhost:3000
#   4. CMS admin: http://localhost:3000/admin
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        MONGODB_URI:            ${MONGODB_URI}
        PAYLOAD_SECRET:         ${PAYLOAD_SECRET}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
        NEXT_PUBLIC_ADMIN_URL:  ${NEXT_PUBLIC_ADMIN_URL:-http://localhost:3000}
        NEXT_PUBLIC_GA_ID:      ${NEXT_PUBLIC_GA_ID}
        NEXT_PUBLIC_MEDIA_URL:  ${NEXT_PUBLIC_MEDIA_URL}
    container_name: jeevanarekha_app
    ports:
      - "3000:3000"
    environment:
      # ── Payload CMS ─────────────────────────────────────
      - MONGODB_URI=${MONGODB_URI}
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - PAYLOAD_SEED=false

      # ── Server URLs ──────────────────────────────────────
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
      - NEXT_PUBLIC_ADMIN_URL=${NEXT_PUBLIC_ADMIN_URL:-http://localhost:3000}

      # ── Analytics ────────────────────────────────────────
      - NEXT_PUBLIC_GA_ID=${NEXT_PUBLIC_GA_ID}

      # ── Media CDN ────────────────────────────────────────
      - NEXT_PUBLIC_MEDIA_URL=${NEXT_PUBLIC_MEDIA_URL}

      # ── AWS S3 (media uploads) ───────────────────────────
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION:-ap-south-1}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}

      # ── AWS CloudFront (cache invalidation on publish) ───
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - CLOUDFRONT_DISTRIBUTION_ID=${CLOUDFRONT_DISTRIBUTION_ID}

      # ── Runtime ──────────────────────────────────────────
      - NODE_ENV=production

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
