# =============================================================================
# Jeevana Rekha — CI/CD Pipeline
#
# Triggers on every push to master.
# Builds a Docker image, pushes it to ECR, then deploys to EC2 over SSH.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#
#   AWS_ACCESS_KEY_ID         IAM user key — needs ECR push permission
#   AWS_SECRET_ACCESS_KEY     Corresponding secret
#   AWS_ACCOUNT_ID            12-digit AWS account ID (for ECR registry URL)
#   EC2_HOST                  EC2 public IP or hostname
#   EC2_SSH_KEY               Contents of the .pem private key file
#   MONGODB_URI               Full MongoDB Atlas connection string
#   PAYLOAD_SECRET            32+ char random secret for Payload CMS
#   NEXT_PUBLIC_SERVER_URL    https://jeevanarekha.com
#   NEXT_PUBLIC_GA_ID         Google Analytics ID (G-XXXXXXXXXX)
# =============================================================================

name: Build & Deploy

on:
  push:
    branches: [master]

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. AWS auth ──────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ── 3. ECR login ─────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build Docker image ────────────────────────────────────────────────
      #
      # NEXT_PUBLIC_* vars must be passed as build args — they are embedded
      # into the JS bundle at compile time by Next.js. Passing them at runtime
      # via --env-file does NOT work for these variables.
      #
      - name: Build Docker image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE: jeevanarekha
          TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg MONGODB_URI="${{ secrets.MONGODB_URI }}" \
            --build-arg PAYLOAD_SECRET="${{ secrets.PAYLOAD_SECRET }}" \
            --build-arg NEXT_PUBLIC_SERVER_URL="${{ secrets.NEXT_PUBLIC_SERVER_URL }}" \
            --build-arg NEXT_PUBLIC_GA_ID="${{ secrets.NEXT_PUBLIC_GA_ID }}" \
            -t $REGISTRY/$IMAGE:$TAG \
            -t $REGISTRY/$IMAGE:latest \
            .

      # ── 5. Push to ECR ───────────────────────────────────────────────────────
      - name: Push image to ECR
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE: jeevanarekha
          TAG: ${{ github.sha }}
        run: |
          docker push $REGISTRY/$IMAGE:$TAG
          docker push $REGISTRY/$IMAGE:latest

      # ── 6. Deploy to EC2 ─────────────────────────────────────────────────────
      #
      # Pull the new image FIRST (while old container still serves traffic),
      # then swap — this minimises the downtime window to just the restart time.
      #
      # Prerequisite: EC2 must have an IAM instance role with ecr:GetAuthorizationToken
      # and ecr:BatchGetImage permissions, OR the AWS credentials are available on EC2.
      #
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            REGISTRY="${{ steps.ecr.outputs.registry }}"
            IMAGE="$REGISTRY/jeevanarekha:latest"

            echo "==> Authenticating with ECR..."
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin "$REGISTRY"

            echo "==> Pulling new image (old container still running)..."
            docker pull "$IMAGE"

            echo "==> Swapping containers..."
            docker stop jeevanarekha_app 2>/dev/null || true
            docker rm   jeevanarekha_app 2>/dev/null || true

            docker run -d \
              --name jeevanarekha_app \
              --restart unless-stopped \
              --env-file /home/ubuntu/.env \
              -p 3000:3000 \
              -v /home/ubuntu/media:/app/public/media \
              "$IMAGE"

            echo "==> Waiting for app to be ready..."
            sleep 15

            echo "==> Health check..."
            curl -f http://localhost:3000/api/health
            echo ""
            echo "==> Deploy complete."

      # ── 7. Notify on failure ─────────────────────────────────────────────────
      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Deploy failed on commit ${{ github.sha }} by ${{ github.actor }}"
          echo "Check the logs above to diagnose."
